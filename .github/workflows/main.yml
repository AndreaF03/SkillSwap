name: SkillSwap CI

on:
push:
branches:
- main
- develop

pull_request:
branches:
- main
- develop

jobs:

backend:
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: backend

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      pip install -r requirements.txt

  - name: Django System Check
    run: |
      python manage.py check
```

frontend:
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: frontend

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install Dependencies
    run: |
      npm install

  - name: Build Frontend
    run: |
      npm run build
```
